# ==========================================================
# MediaCrawler Docker Compose
# Includes optional database services for development
# ==========================================================

services:
  # ---- Main Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      # Mount data directory for persistent crawl results
      - ./data:/app/data
      # Mount .env for configuration (create from .env.example)
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    # Restart unless explicitly stopped
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # ---- MySQL (optional) ----
  mysql:
    image: mysql:8.0
    profiles: ["with-db"]
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: media_crawler
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- PostgreSQL (optional) ----
  postgres:
    image: postgres:16
    profiles: ["with-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: media_crawler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis (optional) ----
  redis:
    image: redis:7-alpine
    profiles: ["with-db"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
  redis_data:
